<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="/static/styles.css" rel="stylesheet">
        <title>Birthdays</title>
    </head>
    <body>
        <div class="header">
            <h1>Birthdays</h1>
        </div>
        <div class="container">
            <div class="section">

                <h2>Add a Birthday</h2>
                <form method="post">
                    <input type="text" autocomplete="off" name="name" placeholder="Name" required>
                    <input type="number" autocomplete="off" name="month" placeholder="Month" min="1" max="12" required>
                    <input type="number" autocomplete="off" name="day" placeholder="Day" min="1" max="31" required>
                    <button type="submit">Submit</button>
                </form>
            </div>

            <div class="section">

                <h2>All Birthdays</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Birthday</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for b in bdays %}
                            <tr>
                                <td>{{ b.name }}</td>
                                <td>{{ b.month }}/{{ b.day }}</td>
                                <td>
                                    <form action="/delete" method="post">
                                        <input type="hidden" name="id" value="{{ b.id }}">
                                        <button type="submit">Delete</button>
                                    </form>
                                </td>
                                <td>
                                    <a href="/edit?id={{ b.id  }}">
                                        <button type="button">Edit</button>
                                    </a>
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
