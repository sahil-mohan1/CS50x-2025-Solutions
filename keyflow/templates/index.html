{% extends "layout.html" %}

{% block title %}
    KeyFlow - Typing Test
{% endblock %}

{% block content %}
<div class="w-full mx-auto mt-4 rounded-lg shadow-lg bg-slate-800/60 backdrop-blur-md border border-slate-700 opacity-0 translate-y-8 animate-fadeinup">
  <!-- outer padding provides small page margins -->
  <div class="px-4 sm:px-6 lg:px-8 py-6 max-w-7xl mx-auto">
    
    {% if not is_logged_in %}
    <div class="text-center text-slate-400 text-sm mb-4">
        You are in Guest Mode. <a href="/login" class="text-sky-400 hover:underline">Log in</a> to save your scores.
    </div>
    {% endif %}

    <!-- Time Selection -->
    <div id="time-selector" class="flex justify-center gap-4 mb-4">
        <button data-time="15" class="time-btn px-4 py-2 rounded-md bg-slate-700 text-slate-300 hover:bg-slate-600 transition">15s</button>
        <button data-time="30" class="time-btn px-4 py-2 rounded-md bg-slate-700 text-slate-300 hover:bg-slate-600 transition active">30s</button>
        <button data-time="45" class="time-btn px-4 py-2 rounded-md bg-slate-700 text-slate-300 hover:bg-slate-600 transition">45s</button>
        <button data-time="60" class="time-btn px-4 py-2 rounded-md bg-slate-700 text-slate-300 hover:bg-slate-600 transition">60s</button>
    </div>

    <!-- Stats Display (WPM, Accuracy, Timer) -->
    <div class="flex flex-col md:flex-row md:justify-around mb-4 text-center text-slate-100 gap-4">
        <div>
            <div class="text-slate-400 text-sm uppercase tracking-wider">WPM</div>
            <div id="wpm-display" class="text-3xl md:text-4xl font-bold text-sky-400">0</div>
        </div>
        <div>
            <div class="text-slate-400 text-sm uppercase tracking-wider">Accuracy</div>
            <div id="accuracy-display" class="text-3xl md:text-4xl font-bold text-sky-400">100%</div>
        </div>
        <div>
            <div class="text-slate-400 text-sm uppercase tracking-wider">Time</div>
            <div id="timer-display" class="text-3xl md:text-4xl font-bold text-sky-400">30</div>
        </div>
    </div>

    <!-- Typing Area Wrapper -->
    <div id="typing-area" class="relative">
        <!-- Paragraph to Type (now a backdrop) -->
        <div id="text-to-type-display" class="w-full text-lg md:text-xl text-slate-400 leading-relaxed tracking-wide p-4 rounded-md bg-slate-900/50 border border-slate-700 mb-4 font-mono select-none">
            <!-- Text will be loaded here by keyflow.js -->
        </div>

        <!-- INVISIBLE User Input Textarea (as an overlay) -->
        <textarea id="user-input" 
            class="absolute top-0 left-0 w-full h-full p-4 rounded-md bg-transparent text-transparent caret-sky-400 border-none focus:outline-none resize-none text-lg md:text-xl leading-relaxed tracking-wide font-mono" 
            placeholder="" 
            autofocus>
        </textarea>
    </div>

    <!-- Results Container (Hidden until test ends) -->
    <div id="results-container" class="hidden w-full bg-slate-900/50 border border-slate-700 p-6 rounded-md mb-4 flex flex-col items-center">
        <h2 class="text-2xl text-sky-400 font-bold mb-4">Test Results</h2>
        <div class="w-full max-w-2xl">
            <canvas id="wpmChart"></canvas>
        </div>
    </div>


    <!-- Reset Button -->
    <div class="mt-4 text-center">
        <button id="reset-button" class="px-8 py-2 bg-slate-700 text-slate-100 rounded-md hover:bg-slate-600 transition-colors font-semibold">
            Reset
        </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
    <script>
        // Pass login status from Flask to JavaScript
        const IS_LOGGED_IN = {{ is_logged_in|tojson }};
    </script>
    <script src="{{ url_for('static', filename='keyflow.js') }}"></script>
{% endblock %}
