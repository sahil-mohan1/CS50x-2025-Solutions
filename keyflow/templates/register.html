{% extends "layout.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 rounded-lg shadow-lg p-8 bg-slate-800/60 backdrop-blur-md border border-slate-700 opacity-0 translate-y-8 animate-fadeinup">
    <h2 class="text-2xl font-bold mb-6 text-center text-slate-100">Create your KeyFlow account</h2>
    <form method="post" action="/register" class="space-y-5">
        <div>
            <label for="username" class="block text-slate-300 mb-1">Username:</label>
            <input type="text" id="username" name="username" autocomplete="off" required
                class="w-full px-4 py-2 rounded-md bg-slate-700 text-slate-100 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-600 transition">
        </div>
        <div>
            <label for="password" class="block text-slate-300 mb-1">Password:</label>
            <input type="password" id="password" name="password" required
                class="w-full px-4 py-2 rounded-md bg-slate-700 text-slate-100 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-600 transition">
        </div>
        <div>
            <label for="confirm_password" class="block text-slate-300 mb-1">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required
                class="w-full px-4 py-2 rounded-md bg-slate-700 text-slate-100 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-600 transition">
        </div>
        <button type="submit"
            class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold py-2 rounded-md transition-colors">
            Register
        </button>
    </form>
    <div class="mt-6 text-center">
        <span class="text-slate-400">Already have an account?</span>
        <a href="/login" class="text-sky-400 hover:underline font-medium ml-1">Login</a>
    </div>
</div>
{% endblock %}
