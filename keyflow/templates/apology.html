{% extends "layout.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="max-w-lg w-full bg-slate-800/60 backdrop-blur-md border border-slate-700 rounded-lg shadow-lg p-8 text-center opacity-0 translate-y-8 animate-fadeinup">
    <div class="text-5xl mb-4">⚠️</div>
    <h1 class="text-2xl font-semibold text-slate-100 mb-2">Something went wrong</h1>
    <p class="text-slate-300 mb-6">{{ message }}</p>
    <div class="flex justify-center gap-3">
      <a href="/" class="px-4 py-2 bg-slate-700 text-slate-100 rounded-md hover:bg-slate-600 transition">Home</a>
    </div>
  </div>
</div>
{% endblock %}
