{% extends "layout.html" %}

{% block title %}
    History
{% endblock %}

{% block main %}
    <div class="container-fluid">
        <h2 class="mb-4">Your Transactions</h2>
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Action</th>
                        <th>Symbol</th>
                        <th>Shares</th>
                        <th>Price</th>
                        <th>Transacted</th>
                    </tr>
                </thead>
                <tbody>
                    {% for txn in transactions %}
                        <tr>
                            <td>{{txn.transaction_type}}</td>
                            <td>{{txn.symbol}}</td>
                            <td>{{txn.shares}}</td>
                            <td>{{txn.price | usd}}</td>
                            <td>{{txn.transacted}}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}
