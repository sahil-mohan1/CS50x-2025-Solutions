{% extends "layout.html" %}

{% block title %}
    Sell stocks
{% endblock %}

{% block main %}
    <form action="/sell" method="post">
            <div class="mb-3">
                <select name="symbol">
                    {% for share in shares %}
                        <option value="{{share}}">{{share}}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="shares" placeholder="No. of shares" type="text" required>
            </div>
            <button class="btn btn-primary" type="submit">Sell</button>
    </form>
{% endblock %}
